services:
  # ─────────────────────────────────────────────
  # HomeOcto Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm homeocto-agent -m "Hello"
  # ─────────────────────────────────────────────
  homeocto-agent:
    image: docker.io/for5millon/homeocto:latest
    container_name: homeocto-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.homeocto
    entrypoint: ["homeocto", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # HomeOcto Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  homeocto-gateway:
    image: docker.io/for5millon/homeocto:latest
    container_name: homeocto-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.picoclaw

  # ─────────────────────────────────────────────
  # HomeOcto Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  homeocto-launcher:
    image: docker.io/for5millon/homeocto:launcher
    container_name: homeocto-launcher
    restart: unless-stopped
    profiles:
      - launcher
    environment:
      - HOMEOCTO_GATEWAY_HOST=0.0.0.0
      # Set a fixed dashboard token instead of a random one each restart.
      # If not set, a random token is generated and printed to the console on startup.
      #- HOMEOCTO_LAUNCHER_TOKEN=your-secret-token-here
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./data:/root/.picoclaw
