services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm homeocto-agent -m "Hello"
  # ─────────────────────────────────────────────
  homeocto-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: homeocto-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.picoclaw/config.json:ro
      - homeocto-workspace:/root/.picoclaw/workspace
      - homeocto-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["homeocto", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: homeocto-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.picoclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - homeocto-workspace:/root/.picoclaw/workspace
      # NPM cache for faster MCP server installs
      - homeocto-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  homeocto-workspace:
  homeocto-npm-cache: # Cache npm packages to speed up MCP server installations
